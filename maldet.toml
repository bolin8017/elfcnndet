[detector]
name = "elfcnndet"
version = "4.2.0"
framework = "lightning"
description = "1D-CNN ELF malware detector with PyTorch Lightning DDP — reference template for the lolday platform on the maldet 2.2 framework"

[input]
binary_format = "elf"
required_sections = [".text"]
dataset_contract = "sample_csv"

[output]
task = "binary_classification"
classes = ["Benign", "Malware"]
positive_class = "Malware"
score_range = [0.0, 1.0]

[resources]
supports = ["cpu", "gpu1", "gpu2"]
recommended = "gpu1"
min_memory_gib = 4
gpu_required = false

[lifecycle]
stages = ["train", "evaluate", "predict"]
supports_serving = false
supports_hpsweep = true
supports_distributed = "ddp"
supports_multinode = false

[artifacts]
model = { path = "model/", type = "dir" }
metrics = { path = "metrics.json", type = "file" }
predictions = { path = "predictions.csv", type = "file" }

[compat]
min_python = "3.12"
min_maldet = "2.2"
schema_version = 2

[stages.train]
reader = "maldet.builtins.readers:SampleCsvReader"
extractor = "elfcnndet.features:Text256Extractor"
model = "elfcnndet.models:make_cnn"
trainer = "maldet.trainers.lightning_trainer:LightningTrainer"
evaluator = "maldet.evaluators.binary:BinaryClassification"
config_class = "elfcnndet.configs:TrainConfig"
params_schema = {}

[stages.evaluate]
reader = "maldet.builtins.readers:SampleCsvReader"
extractor = "elfcnndet.features:Text256Extractor"
evaluator = "maldet.evaluators.binary:BinaryClassification"
config_class = "elfcnndet.configs:EvaluateConfig"
params_schema = {}

[stages.predict]
reader = "maldet.builtins.readers:SampleCsvReader"
extractor = "elfcnndet.features:Text256Extractor"
predictor = "maldet.builtins.predictors:BatchPredictor"
config_class = "elfcnndet.configs:PredictConfig"
params_schema = {}
